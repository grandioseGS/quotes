<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Ink & Oracle — Quote Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080808;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      padding: 1.5rem 1rem 3rem;
    }

    .ink-app {
      background: #0d0d0d;
      border: 1px solid #1e1a14;
      border-radius: 16px;
      width: 100%;
      max-width: 600px;
      padding: clamp(1.5rem, 5vw, 3rem) clamp(1.2rem, 5vw, 2.5rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(1.2rem, 4vw, 1.8rem);
      position: relative;
      overflow: hidden;
    }

    .ink-splat {
      position: absolute;
      border-radius: 50%;
      background: #141414;
      pointer-events: none;
    }

    .ink-title {
      font-family: 'IM Fell English', serif;
      font-size: clamp(24px, 6vw, 32px);
      color: #e8e0d0;
      letter-spacing: 0.04em;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .ink-title span { color: #8b6f47; }

    .ink-subtitle {
      font-family: 'Playfair Display', serif;
      font-size: clamp(10px, 2.5vw, 12px);
      color: #4a4030;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-align: center;
      margin-top: -1rem;
    }

    .ink-divider {
      width: 100px;
      height: 1px;
      background: #2e2820;
      margin: -0.3rem 0;
    }

    .ink-input-wrap { width: 100%; }

    .ink-label {
      display: block;
      font-size: 11px;
      color: #3d3830;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .ink-textarea {
      width: 100%;
      background: #111111;
      border: 1px solid #2a2520;
      border-radius: 8px;
      color: #c8bfaa;
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      line-height: 1.75;
      padding: 0.9rem 1rem;
      resize: none;
      outline: none;
      min-height: 110px;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .ink-textarea::placeholder { color: #2e2820; font-style: italic; }
    .ink-textarea:focus { border-color: #4a3d2a; }

    .ink-btn {
      background: #1a1408;
      border: 1px solid #3d3020;
      border-radius: 8px;
      color: #c8a96e;
      font-family: 'IM Fell English', serif;
      font-size: clamp(15px, 4vw, 16px);
      padding: 0.85rem 2rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: background 0.2s, border-color 0.2s;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .ink-btn:hover { background: #241c0c; border-color: #5a4830; }
    .ink-btn:active { transform: scale(0.98); background: #241c0c; }
    .ink-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .loading-dots {
      display: none;
      gap: 7px;
      align-items: center;
      justify-content: center;
      padding: 0.3rem;
    }

    .loading-dots.visible { display: flex; }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3a2e1a;
      animation: inkdrop 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes inkdrop {
      0%, 80%, 100% { transform: scale(0.6); background: #3a2e1a; }
      40% { transform: scale(1.1); background: #8b6f47; }
    }

    .error-msg {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 13px;
      color: #8a3030;
      text-align: center;
      display: none;
      width: 100%;
      line-height: 1.5;
    }

    .error-msg.visible { display: block; }

    .quote-card {
      width: 100%;
      background: #0a0905;
      border: 1px solid #2a2414;
      border-radius: 12px;
      padding: clamp(1.2rem, 4vw, 2rem) clamp(1rem, 4vw, 1.8rem);
      display: none;
      flex-direction: column;
      gap: 1rem;
    }

    .quote-card.visible { display: flex; }

    .quote-mark {
      font-family: 'IM Fell English', serif;
      font-size: clamp(52px, 12vw, 72px);
      color: #1e1a0e;
      line-height: 0.55;
      user-select: none;
    }

    .quote-text {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: clamp(16px, 4.5vw, 19px);
      line-height: 1.9;
      color: #d4c9b0;
      letter-spacing: 0.01em;
    }

    .quote-rule {
      width: 60px;
      height: 1px;
      background: #3a2e1a;
    }

    .quote-situation {
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      color: #3a3020;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .quote-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .action-btn {
      background: transparent;
      border: 1px solid #2a2414;
      border-radius: 6px;
      color: #4a4030;
      font-family: 'Playfair Display', serif;
      font-size: 12px;
      padding: 7px 16px;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: color 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .action-btn:hover { color: #c8a96e; border-color: #5a4830; }
    .action-btn:active { color: #c8a96e; border-color: #5a4830; }

    @media (max-width: 400px) {
      .ink-app { border-radius: 12px; }
      .quote-actions { justify-content: stretch; }
      .action-btn { flex: 1; text-align: center; }
    }
  </style>
</head>
<body>

  <div class="ink-app">
    <div class="ink-splat" style="width:280px;height:280px;top:-120px;right:-80px;opacity:0.5;"></div>
    <div class="ink-splat" style="width:180px;height:180px;bottom:-60px;left:-40px;opacity:0.35;"></div>

    <div>
      <div class="ink-title">ink & <span>oracle</span></div>
      <div style="margin-top:8px;" class="ink-subtitle">words drawn from the deep</div>
    </div>

    <div class="ink-divider"></div>

    <div class="ink-input-wrap">
      <label class="ink-label">your situation or feeling</label>
      <textarea
        class="ink-textarea"
        id="situation"
        placeholder="e.g. losing someone you love, the courage to start over, watching rain on a window alone..."
        rows="4"
      ></textarea>
    </div>

    <button class="ink-btn" id="generateBtn" onclick="generateQuote()">
      <i class="ti ti-feather" style="font-size:15px; margin-right:8px; vertical-align:-2px;"></i>
      conjure the quote
    </button>

    <div class="loading-dots" id="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="quote-card" id="quoteCard">
      <div class="quote-mark">"</div>
      <div class="quote-text" id="quoteText"></div>
      <div class="quote-rule"></div>
      <div class="quote-situation" id="quoteSituation"></div>
      <div class="quote-actions">
        <button class="action-btn" onclick="copyQuote()" id="copyBtn">
          <i class="ti ti-copy" style="font-size:12px; margin-right:4px; vertical-align:-1px;"></i>copy
        </button>
        <button class="action-btn" onclick="generateQuote()">
          <i class="ti ti-refresh" style="font-size:12px; margin-right:4px; vertical-align:-1px;"></i>regenerate
        </button>
      </div>
    </div>
  </div>

  <script>
    // =============================================
    //  PASTE YOUR GROQ API KEY BELOW
    //  Get it free from: https://console.groq.com/keys
    // =============================================
    const GROQ_API_KEY = "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";
    // =============================================

    async function generateQuote() {
      const situation = document.getElementById('situation').value.trim();
      const btn = document.getElementById('generateBtn');
      const loader = document.getElementById('loader');
      const card = document.getElementById('quoteCard');
      const errorMsg = document.getElementById('errorMsg');

      if (!situation) {
        showError('Tell the oracle what weighs on your mind...');
        return;
      }

      if (GROQ_API_KEY === "YOUR_GROQ_API_KEY_HERE") {
        showError('Replace YOUR_GROQ_API_KEY_HERE with your Groq API key in the script.');
        return;
      }

      btn.disabled = true;
      loader.classList.add('visible');
      card.classList.remove('visible');
      errorMsg.classList.remove('visible');

      try {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + GROQ_API_KEY
          },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            max_tokens: 300,
            messages: [
              {
                role: 'system',
                content: 'You are a poetic oracle. When given a situation, feeling, or theme, you craft a single profound quote of exactly 3 to 4 lines. The quote should feel literary, timeless, and moving — like something from a worn leather journal. Use vivid imagery, metaphor, and emotional weight. Output ONLY the quote itself, nothing else. No attribution, no preamble, no quotation marks.'
              },
              {
                role: 'user',
                content: situation
              }
            ]
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error?.message || 'The ink ran dry. Check your API key.');
        }

        const quote = data.choices[0].message.content.trim();
        document.getElementById('quoteText').textContent = quote;
        document.getElementById('quoteSituation').textContent =
          situation.slice(0, 70) + (situation.length > 70 ? '…' : '');
        card.classList.add('visible');

        document.getElementById('quoteCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      } catch (err) {
        showError(err.message || 'Something darkened the page. Try again.');
      } finally {
        btn.disabled = false;
        loader.classList.remove('visible');
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function copyQuote() {
      const text = document.getElementById('quoteText').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.innerHTML = '<i class="ti ti-check" style="font-size:12px; margin-right:4px; vertical-align:-1px;"></i>copied';
        setTimeout(() => {
          btn.innerHTML = '<i class="ti ti-copy" style="font-size:12px; margin-right:4px; vertical-align:-1px;"></i>copy';
        }, 1800);
      });
    }

    document.getElementById('situation').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        generateQuote();
      }
    });
  </script>

</body>
</html>
